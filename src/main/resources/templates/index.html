<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>Biblioteca</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
            rel="stylesheet">
    </head>

    <body>

        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">
                    Biblioteca
                </a>
            </div>
        </nav>

        <div class="container mt-5">

            <h1 class="text-center">
                Sistema de Biblioteca
            </h1>

            <p class="text-center">
                Administración de libros y autores
            </p>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body text-center">

                            <h3>
                                Libros
                            </h3>

                            <p>
                                Gestionar libros registrados
                            </p>

                            <a th:href="@{/libros}" 
                            class="btn btn-primary">
                                Ver libros
                            </a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body text-center">
                            <h3>
                                Autores
                            </h3>
                            <p>
                                Gestionar autores registrados
                            </p>
                            <a th:href="@{/autores}" 
                            class="btn btn-success">
                                Ver autores
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
